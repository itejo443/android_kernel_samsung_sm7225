name: Clear Releases and Manifests
on:
  workflow_dispatch:

jobs:
  build:

    name: Clear Releases and Manifests
    runs-on: ubuntu-latest
      
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
